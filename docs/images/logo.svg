<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 50"
     role="img" aria-label="Lives of the Saints: The Medieval French Hagiography Project">
  <title>Lives of the Saints: The Medieval French Hagiography Project</title>

  <!--
    Placeholder logo — to be replaced with a final designed logo.
    Design brief: Full project title in gold capitals, flanked by
    French medieval marginal vine ornaments (later Gothic style,
    c. 1380–1440: thin stems, trefoil leaves, stylized flowers, berries).
    Transparent background (sits on crimson nav bar).
  -->

  <!-- ═══════════════════════════════════════════════════════════
       LEFT VINE SPRIG  (x: 0–44, y: 0–50)
       Stem at x=22; branches alternate left/right every ~7px
  ═══════════════════════════════════════════════════════════ -->
  <g fill="#fcc051" stroke="#fcc051" stroke-linecap="round" stroke-linejoin="round">

    <!-- Main stem (gentle S-curve, top to bottom) -->
    <path d="M 22 0 C 20 7 25 13 22 20 C 19 27 24 33 22 40 C 20 46 22 50 22 50"
          stroke-width="1.4" fill="none"/>

    <!-- ── Branch 1 (RIGHT, y≈4): 5-petal flower ── -->
    <path d="M 22 4 Q 29 3 36 2" stroke-width="1.1" fill="none"/>
    <g transform="translate(38, 2)">
      <circle cx="0"    cy="-3.8" r="2.2"/>
      <circle cx="3.6"  cy="-1.18" r="2.2"/>
      <circle cx="2.22" cy="3.08"  r="2.2"/>
      <circle cx="-2.22" cy="3.08" r="2.2"/>
      <circle cx="-3.6" cy="-1.18" r="2.2"/>
      <circle cx="0" cy="0" r="1.7" fill="#c9a96e"/>
    </g>
    <!-- hairline extension from branch 1 -->
    <path d="M 36 2 Q 40 0 42 -1" stroke-width="0.6" fill="none" opacity="0.55"/>

    <!-- ── Branch 2 (LEFT, y≈11): trefoil leaf cluster ── -->
    <path d="M 22 11 Q 15 10 8 9" stroke-width="1.1" fill="none"/>
    <g transform="translate(6, 8)">
      <circle cx="0"   cy="-3.2" r="2.6"/>
      <circle cx="-2.3" cy="1.6" r="2.6"/>
      <circle cx="2.3"  cy="1.6" r="2.6"/>
    </g>
    <!-- tiny leaf spur above branch 2 -->
    <path d="M 14 10 Q 11 7 10 5" stroke-width="0.6" fill="none" opacity="0.55"/>
    <circle cx="10" cy="4.5" r="1.3" opacity="0.6"/>

    <!-- ── Branch 3 (RIGHT, y≈18): berry cluster ── -->
    <path d="M 22 18 Q 29 17 35 16" stroke-width="1.1" fill="none"/>
    <circle cx="37" cy="15.5" r="2.8"/>
    <circle cx="40" cy="18"   r="2.0" opacity="0.7"/>
    <circle cx="35" cy="19.5" r="1.5" opacity="0.55"/>

    <!-- ── Branch 4 (LEFT, y≈25): 4-petal cross flower ── -->
    <path d="M 22 25 Q 15 24 9 23" stroke-width="1.1" fill="none"/>
    <g transform="translate(7, 22.5)">
      <circle cx="0"   cy="-3.3" r="2.1"/>
      <circle cx="3.3" cy="0"    r="2.1"/>
      <circle cx="0"   cy="3.3"  r="2.1"/>
      <circle cx="-3.3" cy="0"   r="2.1"/>
      <circle cx="0"   cy="0"    r="1.9" fill="#c9a96e"/>
    </g>
    <!-- hairline spur -->
    <path d="M 14 23 Q 11 20 9 18" stroke-width="0.6" fill="none" opacity="0.55"/>

    <!-- ── Branch 5 (RIGHT, y≈32): trefoil leaf cluster ── -->
    <path d="M 22 32 Q 29 31 36 30" stroke-width="1.1" fill="none"/>
    <g transform="translate(38, 29)">
      <circle cx="0"    cy="-3.2" r="2.6"/>
      <circle cx="-2.3" cy="1.6"  r="2.6"/>
      <circle cx="2.3"  cy="1.6"  r="2.6"/>
    </g>
    <!-- tiny spur above -->
    <path d="M 30 30 Q 33 27 35 25" stroke-width="0.6" fill="none" opacity="0.55"/>
    <circle cx="35" cy="24.5" r="1.2" opacity="0.6"/>

    <!-- ── Branch 6 (LEFT, y≈39): 5-petal flower ── -->
    <path d="M 22 39 Q 15 38 8 37" stroke-width="1.1" fill="none"/>
    <g transform="translate(6, 36.5)">
      <circle cx="0"    cy="-3.8" r="2.2"/>
      <circle cx="3.6"  cy="-1.18" r="2.2"/>
      <circle cx="2.22" cy="3.08"  r="2.2"/>
      <circle cx="-2.22" cy="3.08" r="2.2"/>
      <circle cx="-3.6" cy="-1.18" r="2.2"/>
      <circle cx="0" cy="0" r="1.7" fill="#c9a96e"/>
    </g>
    <!-- hairline extension left -->
    <path d="M 8 37 Q 4 35 2 33" stroke-width="0.6" fill="none" opacity="0.55"/>

    <!-- ── Branch 7 (RIGHT, y≈46): berry cluster ── -->
    <path d="M 22 46 Q 29 45 35 44" stroke-width="1.1" fill="none"/>
    <circle cx="37" cy="43.5" r="2.8"/>
    <circle cx="40" cy="46"   r="1.8" opacity="0.7"/>

  </g><!-- end left vine -->

  <!-- ═══════════════════════════════════════════════════════════
       RIGHT VINE SPRIG (mirror of left, translated to x: 346–390)
       Applied via: translate(390,0) scale(-1,1)
  ═══════════════════════════════════════════════════════════ -->
  <g transform="translate(390,0) scale(-1,1)"
     fill="#fcc051" stroke="#fcc051" stroke-linecap="round" stroke-linejoin="round">

    <path d="M 22 0 C 20 7 25 13 22 20 C 19 27 24 33 22 40 C 20 46 22 50 22 50"
          stroke-width="1.4" fill="none"/>

    <path d="M 22 4 Q 29 3 36 2" stroke-width="1.1" fill="none"/>
    <g transform="translate(38, 2)">
      <circle cx="0"    cy="-3.8" r="2.2"/>
      <circle cx="3.6"  cy="-1.18" r="2.2"/>
      <circle cx="2.22" cy="3.08"  r="2.2"/>
      <circle cx="-2.22" cy="3.08" r="2.2"/>
      <circle cx="-3.6" cy="-1.18" r="2.2"/>
      <circle cx="0" cy="0" r="1.7" fill="#c9a96e"/>
    </g>
    <path d="M 36 2 Q 40 0 42 -1" stroke-width="0.6" fill="none" opacity="0.55"/>

    <path d="M 22 11 Q 15 10 8 9" stroke-width="1.1" fill="none"/>
    <g transform="translate(6, 8)">
      <circle cx="0"    cy="-3.2" r="2.6"/>
      <circle cx="-2.3" cy="1.6"  r="2.6"/>
      <circle cx="2.3"  cy="1.6"  r="2.6"/>
    </g>
    <path d="M 14 10 Q 11 7 10 5" stroke-width="0.6" fill="none" opacity="0.55"/>
    <circle cx="10" cy="4.5" r="1.3" opacity="0.6"/>

    <path d="M 22 18 Q 29 17 35 16" stroke-width="1.1" fill="none"/>
    <circle cx="37" cy="15.5" r="2.8"/>
    <circle cx="40" cy="18"   r="2.0" opacity="0.7"/>
    <circle cx="35" cy="19.5" r="1.5" opacity="0.55"/>

    <path d="M 22 25 Q 15 24 9 23" stroke-width="1.1" fill="none"/>
    <g transform="translate(7, 22.5)">
      <circle cx="0"    cy="-3.3" r="2.1"/>
      <circle cx="3.3"  cy="0"    r="2.1"/>
      <circle cx="0"    cy="3.3"  r="2.1"/>
      <circle cx="-3.3" cy="0"    r="2.1"/>
      <circle cx="0"    cy="0"    r="1.9" fill="#c9a96e"/>
    </g>
    <path d="M 14 23 Q 11 20 9 18" stroke-width="0.6" fill="none" opacity="0.55"/>

    <path d="M 22 32 Q 29 31 36 30" stroke-width="1.1" fill="none"/>
    <g transform="translate(38, 29)">
      <circle cx="0"    cy="-3.2" r="2.6"/>
      <circle cx="-2.3" cy="1.6"  r="2.6"/>
      <circle cx="2.3"  cy="1.6"  r="2.6"/>
    </g>
    <path d="M 30 30 Q 33 27 35 25" stroke-width="0.6" fill="none" opacity="0.55"/>
    <circle cx="35" cy="24.5" r="1.2" opacity="0.6"/>

    <path d="M 22 39 Q 15 38 8 37" stroke-width="1.1" fill="none"/>
    <g transform="translate(6, 36.5)">
      <circle cx="0"    cy="-3.8" r="2.2"/>
      <circle cx="3.6"  cy="-1.18" r="2.2"/>
      <circle cx="2.22" cy="3.08"  r="2.2"/>
      <circle cx="-2.22" cy="3.08" r="2.2"/>
      <circle cx="-3.6" cy="-1.18" r="2.2"/>
      <circle cx="0" cy="0" r="1.7" fill="#c9a96e"/>
    </g>
    <path d="M 8 37 Q 4 35 2 33" stroke-width="0.6" fill="none" opacity="0.55"/>

    <path d="M 22 46 Q 29 45 35 44" stroke-width="1.1" fill="none"/>
    <circle cx="37" cy="43.5" r="2.8"/>
    <circle cx="40" cy="46"   r="1.8" opacity="0.7"/>

  </g><!-- end right vine (mirrored) -->

  <!-- ═══════════════════════════════════════════════════════════
       TEXT  (centered in x: 46–344)
  ═══════════════════════════════════════════════════════════ -->

  <!-- Main title -->
  <text x="195" y="20"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="16.5"
        font-weight="bold"
        fill="#fcc051"
        letter-spacing="2.5">LIVES OF THE SAINTS</text>

  <!-- Ornamental separator: centered cross-flower + thin rules -->
  <line x1="90"  y1="28" x2="179" y2="28" stroke="#fcc051" stroke-width="0.65" opacity="0.5"/>
  <g transform="translate(195, 28)" fill="#fcc051">
    <circle cx="0"   cy="-3"  r="1.7"/>
    <circle cx="3"   cy="0"   r="1.7"/>
    <circle cx="0"   cy="3"   r="1.7"/>
    <circle cx="-3"  cy="0"   r="1.7"/>
    <circle cx="0"   cy="0"   r="2"/>
  </g>
  <line x1="211" y1="28" x2="300" y2="28" stroke="#fcc051" stroke-width="0.65" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="195" y="40"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="8"
        fill="#fcc051"
        letter-spacing="1.5">THE MEDIEVAL FRENCH HAGIOGRAPHY PROJECT</text>

  <!-- Placeholder indicator (nearly invisible; remove when logo is finalized) -->
  <text x="195" y="49"
        text-anchor="middle"
        font-family="sans-serif"
        font-size="4.5"
        fill="#fcc051"
        opacity="0.28"
        letter-spacing="0.5">[ placeholder ]</text>

</svg>
