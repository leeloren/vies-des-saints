<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="saints-bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#6b1515"/>
      <stop offset="100%" stop-color="#1a0505"/>
    </radialGradient>
    <radialGradient id="saints-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fcc051" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#fcc051" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fcc051" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dragon-eye-r" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fcc051"/>
      <stop offset="100%" stop-color="#8c0303"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="600" fill="url(#saints-bg)"/>

  <!-- Halo glow (upper center) -->
  <ellipse cx="200" cy="175" rx="100" ry="90" fill="url(#saints-halo)"/>

  <!-- DRAGON (lower half, bursting upward from below) -->
  <!-- Dragon body (serpentine, filling lower third) -->
  <path d="M 30 480 Q 80 420 130 400 Q 180 385 200 380
           Q 220 385 270 400 Q 320 420 370 480 Q 340 510 300 500
           Q 260 490 200 485 Q 140 490 100 500 Q 60 510 30 480 Z"
        fill="#2a5c2a" stroke="#fcc051" stroke-width="1.5" opacity="0.9"/>
  <!-- Dragon belly scales (lighter) -->
  <path d="M 80 450 Q 140 435 200 432 Q 260 435 320 450 Q 260 465 200 468 Q 140 465 80 450 Z"
        fill="#3a7a3a" opacity="0.6"/>
  <!-- Dragon scales pattern -->
  <ellipse cx="130" cy="420" rx="18" ry="12" fill="none" stroke="#1a3a1a" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="160" cy="408" rx="16" ry="10" fill="none" stroke="#1a3a1a" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="200" cy="403" rx="17" ry="11" fill="none" stroke="#1a3a1a" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="240" cy="408" rx="16" ry="10" fill="none" stroke="#1a3a1a" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="270" cy="420" rx="18" ry="12" fill="none" stroke="#1a3a1a" stroke-width="1.5" opacity="0.7"/>
  <!-- Dragon tail (left) -->
  <path d="M 30 480 Q 10 520 25 560 Q 50 545 60 510 Q 40 500 30 480 Z"
        fill="#2a5c2a"/>
  <!-- Dragon neck / head (center, open mouth) -->
  <path d="M 200 380 Q 195 350 190 320 Q 185 300 188 285
           Q 195 275 200 272 Q 205 275 212 285 Q 215 300 210 320 Q 205 350 200 380 Z"
        fill="#2a5c2a"/>
  <!-- Dragon jaws (open) -->
  <!-- Upper jaw -->
  <path d="M 172 310 Q 180 295 200 292 Q 220 295 228 310 Q 215 315 200 316 Q 185 315 172 310 Z"
        fill="#1a3a1a"/>
  <!-- Lower jaw -->
  <path d="M 172 322 Q 180 330 200 332 Q 220 330 228 322 Q 215 318 200 317 Q 185 318 172 322 Z"
        fill="#1a3a1a"/>
  <!-- Dragon teeth -->
  <polygon points="178,310 183,302 188,310" fill="#e8d5a3" opacity="0.8"/>
  <polygon points="193,310 198,301 203,310" fill="#e8d5a3" opacity="0.8"/>
  <polygon points="208,310 213,302 218,310" fill="#e8d5a3" opacity="0.8"/>
  <polygon points="178,322 183,330 188,322" fill="#e8d5a3" opacity="0.8"/>
  <polygon points="208,322 213,330 218,322" fill="#e8d5a3" opacity="0.8"/>
  <!-- Dragon eyes (glowing) -->
  <ellipse cx="178" cy="295" rx="8" ry="7" fill="url(#dragon-eye-r)"/>
  <ellipse cx="222" cy="295" rx="8" ry="7" fill="url(#dragon-eye-r)"/>
  <ellipse cx="178" cy="295" rx="3" ry="4" fill="#1a0505"/>
  <ellipse cx="222" cy="295" rx="3" ry="4" fill="#1a0505"/>
  <!-- Dragon wings hint (background) -->
  <path d="M 50 350 Q 20 300 40 250 Q 80 280 110 320 Q 80 340 50 350 Z"
        fill="#2a5c2a" opacity="0.6"/>
  <path d="M 350 350 Q 380 300 360 250 Q 320 280 290 320 Q 320 340 350 350 Z"
        fill="#2a5c2a" opacity="0.6"/>

  <!-- SAINT MARGARET (emerging triumphant from dragon, upper portion) -->
  <!-- She is shown from waist up, bursting upward through the dragon -->

  <!-- Robes / gown (white/silver, billowing) -->
  <path d="M 165 380 Q 155 340 158 290 Q 165 265 200 258
           Q 235 265 242 290 Q 245 340 235 380
           Q 220 370 200 368 Q 180 370 165 380 Z"
        fill="#f5e6c8" stroke="#e8c97e" stroke-width="1.5"/>
  <!-- Crimson mantle / cloak -->
  <path d="M 162 360 Q 148 320 152 280 Q 158 260 165 252
           Q 155 265 150 290 Q 145 320 148 360 Z"
        fill="#8c0303" opacity="0.85"/>
  <path d="M 238 360 Q 252 320 248 280 Q 242 260 235 252
           Q 245 265 250 290 Q 255 320 252 360 Z"
        fill="#8c0303" opacity="0.85"/>

  <!-- Margaret's arms -->
  <!-- Left arm raised (holding cross) -->
  <path d="M 165 295 Q 145 265 138 240 Q 148 232 160 238 Q 165 260 178 285 Z"
        fill="#c9a06a"/>
  <!-- Right arm (gesturing outward, pointing down at dragon) -->
  <path d="M 235 300 Q 255 278 268 265 Q 276 272 272 282 Q 258 292 244 312 Z"
        fill="#c9a06a"/>

  <!-- CROSS (held in left hand, prominent) -->
  <!-- Vertical bar -->
  <rect x="126" y="210" width="8" height="65" rx="2" fill="#fcc051" stroke="#c9a96e" stroke-width="1"/>
  <!-- Horizontal bar -->
  <rect x="110" y="228" width="40" height="8" rx="2" fill="#fcc051" stroke="#c9a96e" stroke-width="1"/>
  <!-- Cross cap decoration -->
  <circle cx="130" cy="212" r="5" fill="#fcc051"/>
  <!-- Cross gemstones -->
  <circle cx="130" cy="250" r="3" fill="#8c0303"/>
  <circle cx="112" cy="232" r="3" fill="#8c0303"/>
  <circle cx="148" cy="232" r="3" fill="#8c0303"/>

  <!-- Margaret's HEAD / FACE -->
  <!-- Neck -->
  <rect x="192" y="248" width="16" height="18" rx="4" fill="#c9a06a"/>
  <!-- Face -->
  <ellipse cx="200" cy="228" rx="28" ry="32" fill="#c9a06a"/>
  <!-- Hair (dark, framing face) -->
  <path d="M 174 218 Q 172 200 180 186 Q 190 176 200 174 Q 210 176 220 186
           Q 228 200 226 218 Q 218 208 200 206 Q 182 208 174 218 Z"
        fill="#3a2010"/>
  <!-- Hair flowing sides -->
  <path d="M 174 218 Q 168 235 170 255 Q 176 240 182 225 Z" fill="#3a2010"/>
  <path d="M 226 218 Q 232 235 230 255 Q 224 240 218 225 Z" fill="#3a2010"/>
  <!-- Crown / diadem -->
  <path d="M 176 192 L 176 182 L 184 190 L 192 178 L 200 188 L 208 178 L 216 190 L 224 182 L 224 192 Z"
        fill="#fcc051" stroke="#c9a96e" stroke-width="1"/>
  <!-- Crown gems -->
  <circle cx="184" cy="190" r="3" fill="#8c0303"/>
  <circle cx="200" cy="188" r="3.5" fill="#8c0303"/>
  <circle cx="216" cy="190" r="3" fill="#8c0303"/>
  <!-- Face features -->
  <!-- Eyes (wide, triumphant) -->
  <ellipse cx="191" cy="225" rx="6" ry="5" fill="white"/>
  <ellipse cx="209" cy="225" rx="6" ry="5" fill="white"/>
  <ellipse cx="192" cy="225" rx="3.5" ry="4" fill="#2c1810"/>
  <ellipse cx="210" cy="225" rx="3.5" ry="4" fill="#2c1810"/>
  <!-- Eyebrows (arched, strong) -->
  <path d="M 184 218 Q 191 214 198 216" stroke="#3a2010" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 202 216 Q 209 214 216 218" stroke="#3a2010" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Lips (slight smile) -->
  <path d="M 194 238 Q 200 243 206 238" stroke="#8c4040" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M 200 228 Q 197 234 196 238 M 200 228 Q 203 234 204 238"
        stroke="#a07850" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- HALO (golden radiance behind head) -->
  <circle cx="200" cy="225" r="44" fill="none" stroke="#fcc051" stroke-width="4" opacity="0.85"/>
  <circle cx="200" cy="225" r="50" fill="none" stroke="#fcc051" stroke-width="1.5" opacity="0.35"/>
  <!-- Halo rays -->
  <g stroke="#fcc051" stroke-width="1" opacity="0.5">
    <line x1="200" y1="175" x2="200" y2="165"/>
    <line x1="228" y1="183" x2="236" y2="176"/>
    <line x1="244" y1="210" x2="254" y2="207"/>
    <line x1="244" y1="240" x2="254" y2="243"/>
    <line x1="228" y1="267" x2="236" y2="274"/>
    <line x1="172" y1="183" x2="164" y2="176"/>
    <line x1="156" y1="210" x2="146" y2="207"/>
    <line x1="156" y1="240" x2="146" y2="243"/>
    <line x1="172" y1="267" x2="164" y2="274"/>
  </g>

  <!-- Stars (medieval ornament) -->
  <g fill="#fcc051" opacity="0.45">
    <polygon points="38,38 41,48 52,48 43,54 46,64 38,58 30,64 33,54 24,48 35,48" transform="scale(0.6) translate(25,25)"/>
    <polygon points="38,38 41,48 52,48 43,54 46,64 38,58 30,64 33,54 24,48 35,48" transform="translate(340,0) scale(0.6) translate(25,25)"/>
    <polygon points="38,38 41,48 52,48 43,54 46,64 38,58 30,64 33,54 24,48 35,48" transform="translate(0,520) scale(0.6) translate(25,25)"/>
    <polygon points="38,38 41,48 52,48 43,54 46,64 38,58 30,64 33,54 24,48 35,48" transform="translate(340,520) scale(0.6) translate(25,25)"/>
  </g>

  <!-- Gold border -->
  <rect x="10" y="10" width="380" height="580" rx="8" fill="none" stroke="#fcc051" stroke-width="4"/>
  <rect x="18" y="18" width="364" height="564" rx="6" fill="none" stroke="#fcc051" stroke-width="1" opacity="0.35"/>

  <!-- Placeholder note -->
  <text x="200" y="570" text-anchor="middle" font-family="sans-serif" font-size="10"
        fill="#fcc051" opacity="0.38" letter-spacing="1">[ placeholder — replace with manuscript image ]</text>
</svg>
